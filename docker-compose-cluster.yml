# ============================================================
# BJT Agent - 集群部署 Docker Compose（数据库节点专用）
# 包含: PostgreSQL + PgBouncer + Redis
#
# 使用方式：
#   docker compose -f docker-compose-cluster.yml up -d
#
# 注意：API 节点和 Celery Worker 以原生进程方式运行（见 bjt-cluster.sh）
# ============================================================

version: '3.8'

services:
  # ---- PgBouncer 连接池代理 ----
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1
    container_name: bjt-pgbouncer
    environment:
      DATABASE_URL: "postgres://ssirs_user:${POSTGRES_PASSWORD}@postgres:5432/bjt_agent"
      PGBOUNCER_LISTEN_ADDR: "0.0.0.0"
      PGBOUNCER_LISTEN_PORT: "6432"
      PGBOUNCER_POOL_MODE: "transaction"
      PGBOUNCER_MAX_CLIENT_CONN: "300"
      PGBOUNCER_DEFAULT_POOL_SIZE: "40"
      PGBOUNCER_RESERVE_POOL_SIZE: "20"
      PGBOUNCER_RESERVE_POOL_TIMEOUT: "3"
      PGBOUNCER_SERVER_IDLE_TIMEOUT: "300"
      PGBOUNCER_SERVER_LIFETIME: "1800"
      PGBOUNCER_SERVER_CHECK_QUERY: "SELECT 1"
      PGBOUNCER_SERVER_CHECK_DELAY: "30"
      PGBOUNCER_LOG_POOLER_ERRORS: "1"
      PGBOUNCER_STATS_PERIOD: "60"
      PGBOUNCER_AUTH_TYPE: "md5"
      PGBOUNCER_AUTH_FILE: "/etc/pgbouncer/userlist.txt"
    ports:
      - "6432:6432"
    volumes:
      - ./deploy/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - bjt-network
    healthcheck:
      test: ["CMD", "pgbouncer", "-u", "nobody", "-q", "-R", "-h", "localhost", "-p", "6432", "-U", "bjt_monitor", "bjt_agent"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- PostgreSQL ----
  postgres:
    image: postgres:15
    container_name: bjt-postgres
    environment:
      POSTGRES_DB: bjt_agent
      POSTGRES_USER: ssirs_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # 不对外暴露端口，仅通过 PgBouncer 访问
    # 如需直接管理可取消注释
    # ports:
    #   - "7004:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=2GB
        -c effective_cache_size=6GB
        -c work_mem=16MB
        -c maintenance_work_mem=256MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
    restart: unless-stopped
    networks:
      - bjt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssirs_user -d bjt_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: bjt-redis
    command: >
      redis-server
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --save 300 100
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - bjt-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  bjt-network:
    driver: bridge
