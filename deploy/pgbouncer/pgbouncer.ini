;; ============================================================
;; PgBouncer 连接池配置
;; 集群部署：将 ~216 个应用连接压缩至 50-80 个真实 PG 连接
;;
;; 部署方式：
;;   方式 1: Docker Compose（推荐，见 docker-compose-cluster.yml）
;;   方式 2: 系统安装
;;     sudo apt install pgbouncer
;;     sudo cp pgbouncer.ini /etc/pgbouncer/pgbouncer.ini
;;     sudo cp userlist.txt /etc/pgbouncer/userlist.txt
;;     sudo systemctl restart pgbouncer
;; ============================================================

[databases]
; 应用数据库 - 通过 PgBouncer 代理
bjt_agent = host=183.66.37.186 port=7004 dbname=bjt_agent

[pgbouncer]
; 监听地址和端口（应用连接此地址替代直连 PG）
listen_addr = 0.0.0.0
listen_port = 6432

; 连接池模式
; - transaction: 每个事务结束后释放连接回池，适合高并发短事务（推荐）
; - session: 客户端断开后才释放，适合使用临时表/session变量的场景
; - statement: 每条语句后释放，不支持事务
pool_mode = transaction

; 连接池大小
; max_client_conn: 允许的最大客户端连接数（应用侧）
;   计算: 3 API × 4 workers × 30 + 7 Review × (5+10) + 2 Parser × (2+5) ≈ 216
;   设为 300 留余量
max_client_conn = 300

; default_pool_size: 每个数据库/用户对的默认服务端连接数
;   transaction 模式下可远小于客户端连接数
;   20 并发审查 × 平均 1 活跃连接 + API 连接 ≈ 50-80
default_pool_size = 40

; reserve_pool_size: 预留连接池大小（突发流量时使用）
reserve_pool_size = 20

; 预留连接等待超时（秒）
reserve_pool_timeout = 3

; 服务端空闲连接超时（秒），及时释放空闲 PG 连接
server_idle_timeout = 300

; 服务端连接生命周期（秒），定期重建防止长期累积问题
server_lifetime = 1800

; 服务端登录超时（秒）
server_login_retry = 3

; 客户端空闲超时（秒），清理断开的客户端
client_idle_timeout = 600

; 客户端登录超时（秒）
client_login_timeout = 15

; 保持连接活跃
server_check_query = SELECT 1
server_check_delay = 30

; 日志
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; 管理接口（仅本地访问）
admin_users = bjt_admin
stats_users = bjt_monitor

; 进程用户（Docker 环境下使用）
; auth_type = md5 时使用 userlist.txt
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; 禁用不必要的管理命令
; extra 连接参数（如需要可取消注释）
; server_reset_query = DISCARD ALL
